name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build shared
        run: bun run build
        working-directory: packages/shared

      - name: Build result
        run: bun run build
        working-directory: packages/result

      - name: Build cors
        run: bun run build
        working-directory: packages/cors

      - name: Build query-parser
        run: bun run build
        working-directory: packages/query-parser

      - name: Build rate-limiter
        run: bun run build
        working-directory: packages/rate-limiter

      - name: Build router
        run: bun run build
        working-directory: packages/router

      - name: Test result
        run: bun test
        working-directory: packages/result

      - name: Test cors
        run: bun test
        working-directory: packages/cors

      - name: Test query-parser
        run: bun test
        working-directory: packages/query-parser

      - name: Test router
        run: bun test
        working-directory: packages/router

      - name: Start Redis for rate-limiter
        run: docker compose up -d --wait
        working-directory: packages/rate-limiter

      - name: Test rate-limiter
        run: bun run test
        working-directory: packages/rate-limiter

      - name: Stop Redis
        if: always()
        run: docker compose down
        working-directory: packages/rate-limiter

      - name: Test router
        run: bun test
        working-directory: packages/router

      - name: Extract result coverage
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: result-cov
        working-directory: packages/result
        run: |
          LF=$(grep -oP '^LF:\K\d+' coverage/lcov.info | paste -sd+ | bc)
          LH=$(grep -oP '^LH:\K\d+' coverage/lcov.info | paste -sd+ | bc)
          PCT=$(echo "scale=1; $LH * 100 / $LF" | bc)
          echo "percentage=$PCT" >> "$GITHUB_OUTPUT"
          if (( $(echo "$PCT >= 95" | bc -l) )); then echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif (( $(echo "$PCT >= 80" | bc -l) )); then echo "color=green" >> "$GITHUB_OUTPUT"
          elif (( $(echo "$PCT >= 60" | bc -l) )); then echo "color=yellow" >> "$GITHUB_OUTPUT"
          else echo "color=red" >> "$GITHUB_OUTPUT"; fi

      - name: Extract cors coverage
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: cors-cov
        working-directory: packages/cors
        run: |
          LF=$(grep -oP '^LF:\K\d+' coverage/lcov.info | paste -sd+ | bc)
          LH=$(grep -oP '^LH:\K\d+' coverage/lcov.info | paste -sd+ | bc)
          PCT=$(echo "scale=1; $LH * 100 / $LF" | bc)
          echo "percentage=$PCT" >> "$GITHUB_OUTPUT"
          if (( $(echo "$PCT >= 95" | bc -l) )); then echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif (( $(echo "$PCT >= 80" | bc -l) )); then echo "color=green" >> "$GITHUB_OUTPUT"
          elif (( $(echo "$PCT >= 60" | bc -l) )); then echo "color=yellow" >> "$GITHUB_OUTPUT"
          else echo "color=red" >> "$GITHUB_OUTPUT"; fi

      - name: Extract query-parser coverage
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: query-parser-cov
        working-directory: packages/query-parser
        run: |
          LF=$(grep -oP '^LF:\K\d+' coverage/lcov.info | paste -sd+ | bc)
          LH=$(grep -oP '^LH:\K\d+' coverage/lcov.info | paste -sd+ | bc)
          PCT=$(echo "scale=1; $LH * 100 / $LF" | bc)
          echo "percentage=$PCT" >> "$GITHUB_OUTPUT"
          if (( $(echo "$PCT >= 95" | bc -l) )); then echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif (( $(echo "$PCT >= 80" | bc -l) )); then echo "color=green" >> "$GITHUB_OUTPUT"
          elif (( $(echo "$PCT >= 60" | bc -l) )); then echo "color=yellow" >> "$GITHUB_OUTPUT"
          else echo "color=red" >> "$GITHUB_OUTPUT"; fi

      - name: Extract router coverage
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: router-cov
        working-directory: packages/router
        run: |
          LF=$(grep -oP '^LF:\K\d+' coverage/lcov.info | paste -sd+ | bc)
          LH=$(grep -oP '^LH:\K\d+' coverage/lcov.info | paste -sd+ | bc)
          PCT=$(echo "scale=1; $LH * 100 / $LF" | bc)
          echo "percentage=$PCT" >> "$GITHUB_OUTPUT"
          if (( $(echo "$PCT >= 95" | bc -l) )); then echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif (( $(echo "$PCT >= 80" | bc -l) )); then echo "color=green" >> "$GITHUB_OUTPUT"
          elif (( $(echo "$PCT >= 60" | bc -l) )); then echo "color=yellow" >> "$GITHUB_OUTPUT"
          else echo "color=red" >> "$GITHUB_OUTPUT"; fi

      - name: Extract rate-limiter coverage
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: rate-limiter-cov
        working-directory: packages/rate-limiter
        run: |
          LF=$(grep -oP '^LF:\K\d+' coverage/lcov.info | paste -sd+ | bc)
          LH=$(grep -oP '^LH:\K\d+' coverage/lcov.info | paste -sd+ | bc)
          PCT=$(echo "scale=1; $LH * 100 / $LF" | bc)
          echo "percentage=$PCT" >> "$GITHUB_OUTPUT"
          if (( $(echo "$PCT >= 95" | bc -l) )); then echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif (( $(echo "$PCT >= 80" | bc -l) )); then echo "color=green" >> "$GITHUB_OUTPUT"
          elif (( $(echo "$PCT >= 60" | bc -l) )); then echo "color=yellow" >> "$GITHUB_OUTPUT"
          else echo "color=red" >> "$GITHUB_OUTPUT"; fi

      - name: Extract router coverage
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: router-cov
        working-directory: packages/router
        run: |
          LF=$(grep -oP '^LF:\K\d+' coverage/lcov.info | paste -sd+ | bc)
          LH=$(grep -oP '^LH:\K\d+' coverage/lcov.info | paste -sd+ | bc)
          PCT=$(echo "scale=1; $LH * 100 / $LF" | bc)
          echo "percentage=$PCT" >> "$GITHUB_OUTPUT"
          if (( $(echo "$PCT >= 95" | bc -l) )); then echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif (( $(echo "$PCT >= 80" | bc -l) )); then echo "color=green" >> "$GITHUB_OUTPUT"
          elif (( $(echo "$PCT >= 60" | bc -l) )); then echo "color=yellow" >> "$GITHUB_OUTPUT"
          else echo "color=red" >> "$GITHUB_OUTPUT"; fi

      - name: Update coverage badges
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          badge() { printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}' "$1" "$2"; }
          gh api --method PATCH /gists/3965fb9d1fe2d6fc5c321cb38d88c823 \
            -f "files[result-coverage.json][content]=$(badge '${{ steps.result-cov.outputs.percentage }}' '${{ steps.result-cov.outputs.color }}')" \
            -f "files[cors-coverage.json][content]=$(badge '${{ steps.cors-cov.outputs.percentage }}' '${{ steps.cors-cov.outputs.color }}')" \
            -f "files[query-parser-coverage.json][content]=$(badge '${{ steps.query-parser-cov.outputs.percentage }}' '${{ steps.query-parser-cov.outputs.color }}')" \
            -f "files[rate-limiter-coverage.json][content]=$(badge '${{ steps.rate-limiter-cov.outputs.percentage }}' '${{ steps.rate-limiter-cov.outputs.color }}')" \
            -f "files[router-coverage.json][content]=$(badge '${{ steps.router-cov.outputs.percentage }}' '${{ steps.router-cov.outputs.color }}')" \
            > /dev/null
